<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saira &amp; Syed &#8211; Wedding Reception</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #eaf2ef;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .invite-wrap {
      position: relative;
      width: 100%;
      max-width: 100vw;
      line-height: 0;
    }

    .invite-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Button overlaid on image — no border, no background box */
    .rsvp-btn {
      position: absolute;
      top: 78%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      font-size: clamp(0.75rem, 4vw, 1rem);
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #3d1f0d;
      background: rgba(184,206,196,0.6);
      border: none;
      padding: clamp(11px,3vw,16px) clamp(38px,12vw,68px);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      outline: none;
      transition: color 0.32s ease;
    }
    .rsvp-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #3d1f0d;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.32s cubic-bezier(.77,0,.175,1);
      z-index: 0;
    }
    .rsvp-btn:hover::before,
    .rsvp-btn:active::before { transform: scaleX(1); }
    .rsvp-btn:hover,
    .rsvp-btn:active { color: #f5f0e8; }
    .rsvp-btn span { position: relative; z-index: 1; }

    /* Modal */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(30,12,4,0.55);
      backdrop-filter: blur(5px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #f5f0e8;
      max-width: 420px; width: 100%;
      padding: 46px 38px 40px;
      position: relative;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.38s cubic-bezier(.22,1,.36,1);
      box-shadow: 0 28px 80px rgba(0,0,0,0.22);
    }
    .overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-close {
      position: absolute; top: 16px; right: 18px;
      background: none; border: none;
      font-size: 1.2rem; color: #3d1f0d;
      opacity: 0.4; cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-close:hover { opacity: 1; }

    .modal-title {
      font-family: 'Great Vibes', cursive;
      font-size: 2.3rem;
      color: #3d1f0d;
      text-align: center;
      margin-bottom: 4px;
    }
    .modal-sub {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      color: #3d1f0d;
      opacity: 0.5;
      margin-bottom: 30px;
    }

    .form-group { margin-bottom: 24px; }
    .form-label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #3d1f0d;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .form-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(61,31,13,0.28);
      padding: 7px 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      color: #3d1f0d;
      outline: none;
      transition: border-color 0.22s;
      -moz-appearance: textfield;
    }
    .form-input::-webkit-outer-spin-button,
    .form-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .form-input:focus { border-bottom-color: #b8860b; }
    .form-input::placeholder { color: rgba(61,31,13,0.28); font-style: italic; }

    .form-submit {
      width: 100%;
      margin-top: 8px;
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #f5f0e8;
      background: #3d1f0d;
      border: none;
      padding: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.28s, transform 0.15s;
    }
    .form-submit:hover { background: #5c2d0e; transform: translateY(-1px); }
    .form-submit:active { transform: translateY(0); }
    .form-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .form-error {
      text-align: center;
      margin-top: 12px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.82rem;
      color: #8b2500;
      min-height: 18px;
    }

    .success-state { display: none; text-align: center; padding: 12px 0; }
    .success-state.show { display: block; }
    .success-icon { font-size: 1.8rem; margin-bottom: 12px; color: #b8860b; }
    .success-title {
      font-family: 'Great Vibes', cursive;
      font-size: 2.1rem; color: #3d1f0d; margin-bottom: 8px;
    }
    .success-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; color: #3d1f0d; opacity: 0.65; line-height: 1.65;
    }

    /* ── Accept / Decline toggle ── */
    .attendance-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .toggle-btn {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 11px 6px;
      border: 1.5px solid rgba(61,31,13,0.25);
      background: transparent;
      color: #3d1f0d;
      cursor: pointer;
      transition: background 0.25s, color 0.25s, border-color 0.25s;
      outline: none;
      position: relative;
      overflow: hidden;
    }
    .toggle-btn.accept.selected {
      background: #3d1f0d;
      color: #f5f0e8;
      border-color: #3d1f0d;
    }
    .toggle-btn.decline.selected {
      background: #7a3520;
      color: #f5f0e8;
      border-color: #7a3520;
    }
    .toggle-btn:not(.selected):hover {
      border-color: #3d1f0d;
      background: rgba(61,31,13,0.06);
    }
    /* Hide guest count when declining */
    .guests-row { transition: opacity 0.25s, max-height 0.3s; max-height: 80px; overflow: hidden; }
    .guests-row.hidden { opacity: 0; max-height: 0; pointer-events: none; margin: 0; }
  </style>
</head>

</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzK98gUpATLdY2HwH1eWi2xheWWTcqqW7NfRVwpvVdeQIpmBohHpMASiAdabfJbgQ94KQ/exec';
  let attendance = null;

  function selectAttendance(choice) {
    attendance = choice;
    document.getElementById('btnAccept').classList.toggle('selected', choice === 'accept');
    document.getElementById('btnDecline').classList.toggle('selected', choice === 'decline');
    const guestsRow = document.getElementById('guestsRow');
    if (choice === 'decline') {
      guestsRow.classList.add('hidden');
      document.getElementById('numGuests').value = '';
    } else {
      guestsRow.classList.remove('hidden');
    }
    document.getElementById('formError').textContent = '';
  }

  function openModal() {
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('guestName').focus(), 100);
  }
  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function closeOnOverlay(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  async function submitRSVP() {
    const name   = document.getElementById('guestName').value.trim();
    const guests = document.getElementById('numGuests').value.trim();
    const errEl  = document.getElementById('formError');
    const btn    = document.getElementById('submitBtn');
    const label  = document.getElementById('submitLabel');

    errEl.textContent = '';
    if (!attendance)            { errEl.textContent = 'Please select your attendance.'; return; }
    if (!name)                  { errEl.textContent = 'Please enter your name.'; return; }
    if (attendance === 'accept' && (!guests || +guests < 1)) { errEl.textContent = 'Please enter the number of guests.'; return; }

    btn.disabled = true;
    label.textContent = 'Sending…';

    const payload = {
      name,
      attendance: attendance === 'accept' ? 'Accepts' : 'Declines',
      guests: attendance === 'accept' ? +guests : 0,
      timestamp: new Date().toLocaleString('en-CA', { timeZone: 'America/Toronto' })
    };

    if (SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE') {
      await new Promise(r => setTimeout(r, 900));
      showSuccess(); return;
    }

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      showSuccess();
    } catch {
      errEl.textContent = 'Something went wrong. Please try again.';
      btn.disabled = false;
      label.textContent = 'Send My RSVP';
    }
  }

  function showSuccess() {
    document.getElementById('formState').style.display = 'none';
    document.getElementById('successState').classList.add('show');
    setTimeout(closeModal, 3500);
    setTimeout(() => {
      document.getElementById('formState').style.display = 'block';
      document.getElementById('successState').classList.remove('show');
      ['guestName','numGuests'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitLabel').textContent = 'Send My RSVP';
      document.getElementById('formError').textContent = '';
      attendance = null;
      document.getElementById('btnAccept').classList.remove('selected');
      document.getElementById('btnDecline').classList.remove('selected');
      document.getElementById('guestsRow').classList.remove('hidden');
    }, 4000);
  }
</script>
</body>
</html>
